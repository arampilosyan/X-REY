{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <title>Tuberculosis Detection</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<div class="container">
    <h1>🩺 TB Detection</h1>

<script src="{% static 'script.js' %}"></script>
</body>
</html>
